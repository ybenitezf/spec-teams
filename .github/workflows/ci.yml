name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install peer dependencies (Pi SDK)
        # The Pi SDK declares engines >=22.19.0 but we only need these packages
        # for module resolution (vi.mock importOriginal). Use --ignore-engines
        # to install on older Node versions where the packages are resolvable
        # even if not fully functional — the tests mock the SDK.
        run: npm install --no-save --ignore-engines @earendil-works/pi-coding-agent @earendil-works/pi-tui typebox

      - name: Run tests
        run: npm test
