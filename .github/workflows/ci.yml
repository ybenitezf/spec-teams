name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install peer dependencies (Pi SDK)
        # The Pi SDK declares engines >=22.19.0 but we only need these packages
        # for module resolution (vi.mock importOriginal). Using @latest forces
        # install regardless of Node version — the tests mock the SDK so the
        # packages don't need to be fully functional at runtime.
        run: |
          npm install --no-save @earendil-works/pi-coding-agent@latest @earendil-works/pi-tui@latest typebox@latest

      - name: Run tests
        run: npm test
