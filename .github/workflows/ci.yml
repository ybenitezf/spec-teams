name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install peer dependencies (Pi SDK)
        run: |
          if [ "${{ matrix.node-version }}" = "20" ]; then
            # Pi SDK 0.74.x supports Node >=20.6.0
            npm install --no-save @earendil-works/pi-coding-agent@0.74.2 @earendil-works/pi-tui@0.74.2 typebox@latest
          else
            npm install --no-save @earendil-works/pi-coding-agent@latest @earendil-works/pi-tui@latest typebox@latest
          fi

      - name: Run tests
        run: npm test
