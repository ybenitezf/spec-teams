context: |
  Tech stack: TypeScript, Pi Extension SDK
  We use conventional commits
  Domain: Pi coding agent extension development
  Extensions are TypeScript modules that export a default function
  receiving ExtensionAPI. They register tools, commands, events,
  and UI components.
  Core packages (provided by Pi at runtime, listed as peerDeps):
  - @earendil-works/pi-coding-agent
  - @earendil-works/pi-ai
  - @earendil-works/pi-tui
  - typebox

